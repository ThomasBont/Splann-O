  <path d="M12 22l2 2 4-4" stroke="#5BA3F5" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Yellow/orange fold -->
  <path d="M22 12a6 6 0 0 1 6-6h12a6 6 0 0 1 6 6v24a6 6 0 0 1-6 6H28a6 6 0 0 1-6-6V12z" fill="#F8A93C"/>
